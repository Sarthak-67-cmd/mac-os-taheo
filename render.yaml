# Render static web service configuration for macOS Tahoe UI
# This file defines a simple web service that builds the Vite project and serves the static output.
# Adjust the repository URL and branch as needed for your own deployment.

services:
  - type: web
    name: macos-tahoe-ui
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # Render automatically serves the 'dist' directory.
    # If you prefer a custom start command, you can use a Node server like:
    # startCommand: npx serve -s dist -l 10000
    # You can also set environment variables here:
    # envVars:
    #   - key: NODE_ENV
    #     value: production
    #   - key: VITE_API_URL
    #     value: https://api.example.com
